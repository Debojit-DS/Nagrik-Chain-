services:
  - type: web
    name: nagarik-chain-backend
    runtime: python
    plan: free
    rootDir: nagarik_chain backend
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: PYTHON_VERSION
        value: 3.11
      - key: JWT_SECRET
        generateValue: true
      - key: JWT_ALGORITHM
        value: HS256
      - key: JWT_ACCESS_TOKEN_EXPIRE_MINUTES
        value: "120"
      - key: FABRIC_CHANNEL
        value: nagarik-channel
      - key: FABRIC_CHAINCODE
        value: nagarik
      - key: FABRIC_ORG
        value: Org1MSP
      - key: IPFS_MOCK_CACHE_DIR
        value: /tmp/ipfs-cache